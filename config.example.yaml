# Agent Code Reviewer Configuration

# LLM backend configuration
llm:
  # Provider: qwen, openai, or custom
  provider: qwen

  # Qwen (DashScope) settings
  qwen:
    api_key: ""  # or set DASHSCOPE_API_KEY env var
    model: "qwen-plus"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

  # OpenAI settings
  openai:
    api_key: ""  # or set OPENAI_API_KEY env var
    model: "gpt-4"

  # Custom OpenAI-compatible endpoint
  custom:
    api_key: ""
    model: ""
    base_url: ""

# Code analysis settings
analysis:
  # Maximum file size to analyze (in characters)
  max_file_size: 50000
  # File extensions to include
  include_extensions:
    - .py
    - .js
    - .ts
    - .java
    - .go
    - .rs
    - .cpp
    - .c
    - .h
    - .vue
    - .jsx
    - .tsx
  # Directories to exclude
  exclude_dirs:
    - node_modules
    - .git
    - __pycache__
    - .venv
    - venv
    - dist
    - build
    - .eggs

# Output settings
output:
  # Output format: markdown, json, or both
  format: both
  # Output directory (default: current directory)
  directory: "."
